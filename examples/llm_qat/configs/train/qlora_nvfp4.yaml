# QLoRA: LoRA with real quantization (NVFP4)

# Model
model_name_or_path:  # e.g., Qwen/Qwen3-8B
output_dir:  # e.g., qwen3-8b-qlora-nvfp4

# Quantization
recipe: general/ptq/nvfp4_default-fp8_kv
compress: true

# Dataset
dataset_config: configs/dataset/blend.yaml
train_samples: 20000
eval_samples: 2000

# QLoRA
lora: true

# Hyperparameters
num_train_epochs: 0.5
learning_rate: 1e-3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 2
model_max_length: 8192
warmup_ratio: 0.05
lr_scheduler_type: cosine
gradient_checkpointing: true
use_liger_kernel: true
manual_gc: true
seed: 42

# Evaluation
eval_on_start: true
eval_strategy: steps
eval_steps: 50

# Logging
logging_steps: 1
report_to:
  - tensorboard

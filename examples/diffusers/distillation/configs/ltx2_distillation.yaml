# LTX-2 Distillation Config
#
# Usage:
#   accelerate launch --config_file configs/accelerate/fsdp_ltx2.yaml \
#       run.py --config configs/ltx2_distillation.yaml

model:
  model_name: "ltx2"
  model_path: "/path/to/ltx2-checkpoint.safetensors"
  text_encoder_path: "/path/to/gemma-model"
  dtype: "bfloat16"

distillation:
  teacher_model_path:            # null = same as model.model_path
  teacher_dtype: "bfloat16"
  distillation_alpha: 0.0        # 0 = pure distillation, 1 = pure task loss
  distillation_loss_type: "mse"

  # ModelOpt quantization (set to null to skip)
  quant_cfg:                     # e.g. "FP8_DEFAULT_CFG", "INT8_DEFAULT_CFG"
  calibration_size: 128
  calibration_n_steps: 30
  calibration_guidance_scale: 4.0
  calibration_prompts_file:

  restore_quantized_checkpoint:
  save_quantized_checkpoint:

  resume_from_checkpoint: "latest"

  use_mock_data: false
  mock_data_samples: 100

optimization:
  learning_rate: 2.0e-6
  steps: 10000
  batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  warmup_steps: 100

data:
  preprocessed_data_root: "/path/to/preprocessed/data"
  num_dataloader_workers: 2

validation:
  prompts:
    - "A beautiful sunset over the ocean with gentle waves"
    - "A cat playing with a ball of yarn in a cozy living room"
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  video_dims: [960, 544, 97]     # [width, height, num_frames]
  frame_rate: 25.0
  inference_steps: 30
  guidance_scale: 4.0
  interval: 500
  seed: 42
  skip_initial_validation: false

flow_matching:
  timestep_sampling_mode: "logit_normal"
  timestep_sampling_params:
    mu: 0.0
    sigma: 1.0

checkpoints:
  interval: 1000
  keep_last_n: 3
  precision: "bfloat16"
  must_save_by:                  # minutes; for Slurm time limits

wandb:
  enabled: true
  project: "ltx2-distillation"
  entity:
  tags:
    - "distillation"
    - "ltx2"
    - "modelopt"
  log_validation_videos: true

seed: 42
output_dir: "./outputs/ltx2_distillation"

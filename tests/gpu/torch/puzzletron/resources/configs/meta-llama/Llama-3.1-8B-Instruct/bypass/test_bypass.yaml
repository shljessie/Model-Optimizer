# @package bypass
# Minimal bypass config for GPU integration tests.
# Uses tiny training budget (128 tokens) and tiny model (hidden_size=256,
# intermediate_size=512, 2 layers) to run fast on CI.

dtype: "bf16"
seed: 42
experiment_id:
experiment_dir:
iter_num: 1
step_num: 1
token_count: 0

data:
  data_column: "conversation"
  block_size: 64
  bos_rate: 0.5
  fim_rate: 0
  fim_spm_rate: 0
  source_datasets_to_discard: []
  load_from_disk: true
  keep_in_memory: false
  val_dataset_name: valid
  max_eval_samples: 1
  eval_samples_per_process:
  shuffle_train_data_seed: 42

training:
  learning_rate: 1e-4
  training_tokens: 128
  micro_batch_size: 1
  val_micro_batch_size: 1
  warmup_ratio: 0.05
  warmup_steps:
  min_lr_factor: 1e-5
  grad_accumulation_steps: 1
  skip_first_batches: 0
  weight_decay: 0.1
  decay_lr: true
  beta1: 0.9
  beta2: 0.95
  use_grad_scaling: false
  grad_clip: 1.0
  grad_clip_type: norm
  clipping_count: 0
  log_interval: 5
  eval_interval: 100

resume_checkpoint_path:
find_last_ckpt_for_resume: false
parameter_count:
init_checkpoint_path:

model:
  student_weights_dtype: "bf16"
  model_overrides:
    delete_old_checkpoints: true
    save_interval_seconds:
    save_interval: 1000000000
    save_checkpoint_when_done: true
  model_config_overrides:
    ffn:
      - intermediate_size:
        no_op:
    attention:
      - num_key_value_heads:
        no_op:

model_factory:
  factory: bypass_factory_fn
  block_loss_func: normalized_mse_loss
  gqa_init_mode: AverageKV
  mlp_init_mode: Truncate
  mlp_init_config:
    activations_log_dir:
  linear_init_mode: FromTeacher
  submodule_for_loss_calculation:
  keys_to_learn: entire_block

disable_initial_validate: true
validate_teacher_model: false
validate_student_model: false
disable_validation: true
best_val_loss: 1.0e+9

compile: false
disable_fa2: false
teacher_model_load_on_cpu: false

save_checkpoint_before_training: false
disable_checkpoint_save: false
save_best_ckpt: true
kill_after_first_save: false
realize_best_or_latest: "best"

wandb_log: false
wandb:
  project:
  entity:
